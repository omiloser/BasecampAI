        .search-input { width: 100%; padding: 18px 20px 18px 48px; border: none; font-size: 16px; font-family: inherit; background: transparent; outline: none; }
        .search-results { max-height: 360px; overflow-y: auto; border-top: 1px solid var(--border-light); }

const GLOSSARY = {
    "GenAI": "Generative AI: technology that creates new content (text, images, code) rather than just analyzing existing data. Think of it as AI that produces, not just processes.",
    "LLM": "Large Language Model: the engine behind tools like ChatGPT and Claude. Trained on vast amounts of text to understand and generate human-like language.",
    "Model": "The trained AI 'brain' that powers a tool. Different models have different strengths. Some are better at reasoning, others at speed. Think of it like different car engines.",
    "Token": "How AI measures text, roughly three-quarters of a word. When a tool has a 'token limit' it means there is a cap on how much text it can process at once. A page of text is about 400 tokens.",
    "Prompt": "The instruction or question you give to an AI tool. Better prompts lead to better results. It is the skill that makes the biggest difference in your output quality.",
    "Context window": "How much information an AI can 'hold in mind' at once. A larger context window means it can work with longer documents or remember more of your conversation.",
    "API": "Application Programming Interface: a way for software to talk to AI directly without a chat interface. Developers use APIs to build AI into their own apps.",
    "Fine-tuning": "Customizing an AI model with your own data so it becomes specialized for your specific needs. Like training a general doctor to become a specialist.",
    "Hallucination": "When AI generates information that sounds confident but is factually wrong. This is why you should always verify important facts from AI outputs.",
    "Reasoning": "An AI's ability to think through problems step by step, not just pattern-match. Newer models are much better at this and can solve complex logic and math problems.",
    "Multimodal": "AI that can work with multiple types of input: text, images, audio, video. You can show it a photo and ask questions about it or have it analyze a chart.",
    "Agentic AI": "AI that can take actions on your behalf: browsing the web, running code, managing files. Think of it as AI that does, not just says. It plans, executes and adapts.",
    "Agent": "An AI system that can independently plan and carry out multi-step tasks. Rather than just answering one question, an agent can research a topic, write a report and follow up.",
    "MCP": "Model Context Protocol: an open standard that lets AI tools connect to your apps and data sources (like Google Drive, Slack, databases) to work with your real information. Think of it like USB for AI.",
    "Temperature": "A setting that controls how creative vs. predictable AI responses are. Low temperature means more focused and consistent. High temperature means more creative and varied.",
    "System prompt": "Hidden instructions that shape how an AI behaves in a conversation. Like briefing an assistant before they start work: setting the tone, rules and context.",
    "RAG": "Retrieval-Augmented Generation: AI that pulls in relevant documents before answering so its responses are grounded in your actual data rather than just its training.",
    "Inference": "The process of an AI generating a response to your input. When you send a message and wait for a reply, that is inference happening.",
    "Embedding": "A way AI converts text into numbers so it can measure how similar different pieces of text are. This powers search, recommendations and document organization.",
    "Copilot": "An AI assistant embedded directly inside a tool you already use, like Word, Excel, VS Code or Notion. It can see your document or code and acts as a smart co-worker inside your workflow.",
    "AI Agent": "An AI that can plan and execute multi-step tasks on its own. You give it a goal; it figures out the steps, uses tools (web search, code execution, file access) and loops until the job is done.",
    "Deep Research": "A mode in ChatGPT (and 'Research' mode in Claude) that spins up a background agent. Instead of one answer, the agent plans sub-questions, runs dozens of web searches, reads sources and synthesizes a full report. Can run for several minutes.",
    "Tool use": "The ability of an AI model to call external tools (web search, code execution, a calculator, an API) mid-conversation. This is what turns a plain chatbot into something that can take action.",
    "Agentic loop": "The cycle an AI agent runs: decide what to do → use a tool → look at the result → decide what to do next. Repeated until the task is complete or the agent decides it is done.",
};

// ===== TOOLTIP =====
function Tooltip({ term, children }) {
    const [show, setShow] = useState(false);
    const [pos, setPos] = useState({ top: 0, left: 0 });
    const definition = GLOSSARY[term];
    if (!definition) return children || term;
    const handleEnter = (e) => {
        const rect = (e.target || e.currentTarget).getBoundingClientRect();
        setPos({ top: rect.bottom + 8, left: Math.min(Math.max(rect.left, 16), window.innerWidth - 296) });
        setShow(true);
    };
    return (
        <>
            <span className="tooltip-trigger" onMouseEnter={handleEnter} onMouseLeave={() => setShow(false)}
                onTouchStart={(e) => { e.preventDefault(); handleEnter(e); setTimeout(() => setShow(false), 3000); }}>
                {children || term}
            </span>
            {show && ReactDOM.createPortal(<div className="tooltip-popup" style={{ top: pos.top, left: pos.left }}>{definition}</div>, document.body)}
        </>
    );
}

function SearchOverlay({ onClose, onNavigate }) {
    const [query, setQuery] = useState("");
    const inputRef = useRef(null);
    useEffect(() => { inputRef.current?.focus(); }, []);
    const allItems = useMemo(() => {
        const items = [];
        Object.entries(GLOSSARY).forEach(([term, def]) => items.push({ type: "Glossary", title: term, text: def, section: "glossary" }));
        Object.entries(TASKS).forEach(([cat, tasks]) => tasks.forEach(t => items.push({ type: "Task", title: t.task, text: `${cat} - ${t.tools.join(", ")}`, section: "apply" })));
        TOOLS_DATA.forEach(t => items.push({ type: "Tool", title: t.name, text: `${t.tagline} - ${t.bestFor}`, section: "setup" }));
        CONCEPTS.forEach(c => items.push({ type: "Concept", title: c.title, text: c.content, section: "understand" }));
        MYTHS.forEach(m => items.push({ type: "Myth", title: m.myth, text: m.reality, section: "understand" }));
        INDUSTRY_EXAMPLES.forEach(ind => ind.examples.forEach(ex => items.push({ type: "Industry", title: `${ex.company} (${ind.industry})`, text: ex.what, section: "understand" })));
        return items;
    }, []);
    const results = query.length > 1 ? allItems.filter(i => (i.title + " " + i.text).toLowerCase().includes(query.toLowerCase())).slice(0, 12) : [];
    return (
        <div className="search-overlay" onClick={onClose}>
            <div className="search-box animate-in" onClick={e => e.stopPropagation()}>
                <div style={{ position: 'relative' }}>
                    <div style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)' }}>{Icons.search("#9B9590", 20)}</div>
                    <input ref={inputRef} className="search-input" placeholder="Search terms, tools, tasks..." value={query} onChange={e => setQuery(e.target.value)}/>
                </div>
                {results.length > 0 && (
                    <div className="search-results">
                        {results.map((r, i) => (
                            <div key={i} className="search-result" onClick={() => { onNavigate(r.section); onClose(); }}>
                                <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 4 }}>
                                    <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 6px', background: 'var(--bg-highlight)', borderRadius: 4, color: 'var(--text-tertiary)' }}>{r.type}</span>
                                    <span style={{ fontWeight: 600, fontSize: 14 }}>{r.title}</span>
                                </div>
                                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.4 }}>{r.text.slice(0, 120)}...</div>
                            </div>
                        ))}
                    </div>
                )}
                {query.length > 1 && results.length === 0 && (
                    <div style={{ padding: 24, textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 14 }}>No results for "{query}"</div>
                )}
            </div>
        </div>
    );
}

        const pool = unseen.length > 0 ? unseen : FACTOIDS.map((f, i) => i);
        if (unseen.length === 0) setSeenFactoids(new Set());
        const idx = pool[Math.floor(Math.random() * pool.length)];

        const doScroll = () => {
            try { window.scrollTo({ top: 0, left: 0, behavior: 'auto' }); } catch (e) { window.scrollTo(0, 0); }
            if (document.documentElement) document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;
        };
        doScroll();
        requestAnimationFrame(() => { doScroll(); requestAnimationFrame(doScroll); });
    };

    const currentIdx = sectionOrder.indexOf(activeSection);

                {activeSection === "agents" && (

                            <div>

                                <p style={{ color: 'var(--text-secondary)', fontSize: 15, marginBottom: 24, lineHeight: 1.7 }}>When you ask it to compare three noise-cancelling headphones, here is what is happening while you wait.</p>
                                {[
                                    { n: 1, title: "Breaks the task into sub-questions.", body: "Price. Sound quality. Comfort. Battery life. Noise cancellation strength. Build quality. Six angles, not one vague question." },

                                    { n: 3, title: "Opens dozens of review sites.", body: "Reads the actual article content, not just the search snippet. Skips the ads. Compares what different reviewers say about the same thing." },

                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            {DEEP_DIVE_TOOLS.map((t, i) => (
                                <div key={i} style={{ background: 'var(--bg-card)', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-md)', padding: '18px 20px', boxShadow: 'var(--shadow-sm)' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                                        <span style={{ fontWeight: 600, fontSize: 15 }}>{t.name}</span>
                                        <span style={{ fontSize: 11, padding: '2px 8px', background: 'var(--bg-highlight)', borderRadius: 12, color: 'var(--text-tertiary)', fontWeight: 500, flexShrink: 0 }}>{t.category}</span>
                                    </div>
                                    <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 6 }}>{t.desc}</div>
                                    <div style={{ fontSize: 12, color: 'var(--text-tertiary)', fontWeight: 500 }}>{t.price}</div>
                                </div>
                            ))}
                        </div>
                        <NavFooter/>
                    </div>
                )}

                {/* ===== GLOSSARY ===== */}
                {activeSection === "glossary" && (
                    <div className="animate-fade">
                        <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(24px, 5vw, 32px)', fontWeight: 700, marginBottom: 6 }}>Speak the language</h2>
                        <p style={{ color: 'var(--text-secondary)', marginBottom: 28, fontSize: 15 }}>Key terms explained in plain English. These also appear as tooltips throughout the app.</p>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            {Object.entries(GLOSSARY).sort((a, b) => a[0].localeCompare(b[0])).map(([term, def]) => (
                                <div key={term} style={{ background: 'var(--bg-card)', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-md)', padding: '16px 20px', boxShadow: 'var(--shadow-sm)' }}>
                                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6, color: 'var(--accent)' }}>{term}</div>
                                    <div style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{def}</div>
                                </div>
                            ))}
                        </div>
                        <NavFooter/>
                    </div>
                )}

                {/* ===== CONNECT ===== */}
                {activeSection === "connect" && (
                    <div className="animate-fade">
                        <h2 style={{ fontFamily: "'Source Serif 4', serif", fontSize: 'clamp(24px, 5vw, 32px)', fontWeight: 700, marginBottom: 6 }}>You made it</h2>
                        <p style={{ color: 'var(--text-secondary)', marginBottom: 28, fontSize: 15, lineHeight: 1.7 }}>
                            You now have the foundations to start using AI meaningfully in your work.
                            The biggest step is the first real task you try, not the perfect tool or the perfect prompt.
                        </p>

                        {/* Quick wins recap */}
                        <div style={{ background: 'var(--success-bg)', border: '1.5px solid var(--success)', borderRadius: 'var(--radius-lg)', padding: '20px', marginBottom: 24 }}>
                            <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--success)', marginBottom: 12 }}>Your next 3 moves</div>
                            {["Download one AI app (Claude or ChatGPT) right now", "Copy one prompt from the Apply tab and try it on a real task today", "After one week, decide if a $20/mo upgrade is worth it for you"].map((item, i) => (
                                <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start', marginBottom: 8 }}>
                                    <div style={{ width: 22, height: 22, borderRadius: '50%', border: '1.5px solid var(--success)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: 'var(--success)', flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
                                    <span style={{ fontSize: 14, lineHeight: 1.5 }}>{item}</span>
                                </div>
                            ))}
                        </div>

                        {/* Contact form */}
                        <div style={{ background: 'var(--bg-card)', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '24px', marginBottom: 28, boxShadow: 'var(--shadow-sm)' }}>
                            <h3 style={{ fontSize: 17, fontWeight: 700, marginBottom: 16 }}>Have you found it useful? Please let me know.</h3>
                            <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 20, lineHeight: 1.6 }}>
                                I am building this for people who want to get started with AI.
                                Your feedback helps me make it better.
                            </p>
                            {!contactSent ? (
                                <div>
                                    <input type="text" placeholder="Your name" value={contactData.name} onChange={e => setContactData({...contactData, name: e.target.value})}
                                        style={{ width: '100%', padding: '14px 16px', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 15, marginBottom: 10, background: 'var(--bg-warm)', fontFamily: 'inherit', outline: 'none' }}/>
                                    <input type="email" placeholder="Email address" value={contactData.email} onChange={e => setContactData({...contactData, email: e.target.value})}
                                        style={{ width: '100%', padding: '14px 16px', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 15, marginBottom: 10, background: 'var(--bg-warm)', fontFamily: 'inherit', outline: 'none' }}/>
                                    <textarea placeholder="What was most useful? What is missing? (optional)" value={contactData.message} onChange={e => setContactData({...contactData, message: e.target.value})} rows={3}
                                        style={{ width: '100%', padding: '14px 16px', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 15, marginBottom: 16, background: 'var(--bg-warm)', fontFamily: 'inherit', resize: 'vertical', outline: 'none' }}/>
                                    <button onClick={() => {
                                        if (contactData.name || contactData.email) {
                                            fetch("https://formspree.io/f/xjgpvnqb", {
                                                method: "POST", headers: { "Content-Type": "application/json" },
                                                body: JSON.stringify({ name: contactData.name, email: contactData.email, message: contactData.message, _subject: "Basecamp AI: New feedback" })
                                            }).catch(() => {});
                                            if (typeof gtag === 'function') gtag('event', 'feedback_submitted', { event_category: 'engagement' });
                                            setContactSent(true);
                                        }
                                    }}
                                        style={{ width: '100%', padding: '14px', background: 'var(--text-primary)', color: '#fff', border: 'none', borderRadius: 'var(--radius-xl)', fontSize: 15, fontWeight: 600, cursor: 'pointer' }}>Share feedback</button>
                                </div>
                            ) : (
                                <div style={{ textAlign: 'center', padding: '20px 0' }}>
                                    {Icons.apply("#4A8C6F", 40)}
                                    <div style={{ fontWeight: 600, fontSize: 16, marginTop: 8 }}>Thanks, {contactData.name}!</div>
                                    <div style={{ color: 'var(--text-secondary)', fontSize: 14 }}>Appreciate you sharing. Happy building.</div>
                                </div>
                            )}
                        </div>

                        {/* LinkedIn */}
                        <div style={{ background: 'var(--bg-card)', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: '24px', textAlign: 'center', boxShadow: 'var(--shadow-sm)', marginBottom: 24 }}>
                            <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600 }}>Built by</p>
                            <p style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Source Serif 4', serif", marginBottom: 6 }}>Olga Miloserdova</p>
                            <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16 }}>I share practical AI tips and guides regularly. Follow along so you do not miss the next one.</p>
                            <a href="https://www.linkedin.com/in/miloserdova/" target="_blank" rel="noopener noreferrer"
                                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '14px 28px', background: '#0A66C2', color: '#fff', borderRadius: 'var(--radius-xl)', textDecoration: 'none', fontSize: 15, fontWeight: 600 }}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                                Follow on LinkedIn
                            </a>
                        </div>

                        {/* Share the guide */}
                        <div style={{ background: 'var(--bg-highlight)', borderRadius: 'var(--radius-lg)', padding: '20px', textAlign: 'center' }}>
                            <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>Know someone who would find this useful?</p>
                            <button onClick={shareApp}
                                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 24px', background: 'var(--bg-card)', border: '1.5px solid var(--border)', borderRadius: 'var(--radius-xl)', fontSize: 14, fontWeight: 500, cursor: 'pointer', color: 'var(--text-primary)' }}>
                                {Icons.share("#C47035", 16)} Share this guide
                            </button>
                        </div>

                        <NavFooter/>
                    </div>
                )}
            </div>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
